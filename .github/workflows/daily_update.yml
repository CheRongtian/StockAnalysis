name: Daily stock data update

on:
  schedule:
    # Beijing time 16:10, Monday to Friday. GitHub cron uses UTC.
    - cron: "10 8 * * 1-5"
  workflow_dispatch:
    inputs:
      sector_limit:
        description: "Limit number of sectors for test runs; 0 means all"
        required: false
        default: "0"
      max_stocks_per_sector:
        description: "Limit stocks per sector for test runs; 0 means all"
        required: false
        default: "0"
      max_pages:
        description: "Max HTML pages to scan when merging THS members"
        required: false
        default: "30"

permissions:
  contents: write

concurrency:
  group: stock-data-update
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      STOCK_ANALYSIS_SECTOR_LIMIT: ${{ inputs.sector_limit || '0' }}
      STOCK_ANALYSIS_MAX_STOCKS_PER_SECTOR: ${{ inputs.max_stocks_per_sector || '0' }}
      STOCK_ANALYSIS_MAX_PAGES: ${{ inputs.max_pages || '30' }}
      STOCK_ANALYSIS_OUTPUT: docs/data.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 akshare

      - name: Fetch stock data
        run: python fetch_tech_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
